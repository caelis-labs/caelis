name: quality

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: make fmt-check

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: ./...
          install-mode: goinstall

      - name: Vet
        run: make vet

      - name: Architecture lint
        run: make arch-lint

      - name: Agent SDK package boundary
        run: make sdk-boundary-check

      - name: Control client protocol generation
        run: make client-protocol-check

      - name: Documentation links
        run: make docs-links

      - name: Test
        run: make test

      - name: Build
        run: make build

  sdk-race:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Focused Agent SDK race
        run: make sdk-race

  windows-persistence:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Cross-compilation cannot catch Windows file-lock and durable-rename
      # behavior. Keep the supported release target on a real Windows runner.
      - name: Windows persistence and credential runtime
        run: go test -count=1 ./agent-sdk/session/file ./control/client ./app/controlserver
