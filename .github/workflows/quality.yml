name: quality

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      sdk_proxy_version:
        description: Tagged root-module version used by the no-replace consumer smoke
        required: false
        type: string
      extended_validation:
        description: Run release-depth race, regression, and tagged-proxy gates
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: make fmt-check

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: ./...
          install-mode: goinstall

      - name: Vet
        run: make vet

      - name: Architecture lint
        run: make arch-lint

      - name: Agent SDK package boundary
        run: make sdk-boundary-check

      - name: Control client protocol generation
        run: make client-protocol-check

      - name: Documentation links
        run: make docs-links

      - name: Test
        run: make test

      - name: Focused Agent SDK race
        if: github.event_name == 'pull_request' || inputs.extended_validation
        run: make sdk-race

      - name: Regression
        if: github.event_name == 'pull_request' || inputs.extended_validation
        run: make regression

      - name: Tagged Agent SDK external consumer
        if: github.event_name == 'pull_request' || inputs.extended_validation
        run: make sdk-proxy-smoke
        env:
          SDK_PROXY_VERSION: ${{ inputs.sdk_proxy_version }}

      - name: Build
        run: make build

  windows-persistence:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Cross-compilation cannot catch Windows file-lock and durable-rename
      # behavior. Keep the supported release target on a real Windows runner.
      - name: Windows persistence and credential runtime
        run: go test -count=1 ./agent-sdk/session/file ./internal/controlclient ./app/controlserver
