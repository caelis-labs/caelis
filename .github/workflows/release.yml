name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: default
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.1"
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for trusted publishing
        run: |
          npm i -g npm@^11.10.0
          npm -v
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set package version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node ./npm/scripts/set-version.mjs "${GITHUB_REF_NAME#v}"
      - name: Stage platform packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: node ./npm/scripts/stage-release.mjs "${GITHUB_REF_NAME#v}" ./dist
      - name: Publish platform packages
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CAELIS_NPM_PUBLISH_PROVENANCE: "false"
        run: >
          node ./npm/scripts/publish-release.mjs
          ./npm/packages/caelis-darwin-arm64
          ./npm/packages/caelis-darwin-x64
          ./npm/packages/caelis-linux-arm64
          ./npm/packages/caelis-linux-x64
          ./npm/packages/caelis-windows-arm64
          ./npm/packages/caelis-windows-x64
      - name: Publish main package
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CAELIS_NPM_PUBLISH_PROVENANCE: "false"
        run: node ./npm/scripts/publish-release.mjs ./npm
