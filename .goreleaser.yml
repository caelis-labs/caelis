version: 2

project_name: caelis

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: caelis
    main: ./cmd/caelis
    binary: caelis
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/OnslaughtSnail/caelis/internal/version.Version={{ .Tag }}
      - -X github.com/OnslaughtSnail/caelis/internal/version.Commit={{ .Commit }}
      - -X github.com/OnslaughtSnail/caelis/internal/version.Date={{ .Date }}
  - id: caelis-command-runner
    main: ./cmd/caelis-command-runner
    binary: caelis-command-runner
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/OnslaughtSnail/caelis/internal/version.Version={{ .Tag }}
      - -X github.com/OnslaughtSnail/caelis/internal/version.Commit={{ .Commit }}
      - -X github.com/OnslaughtSnail/caelis/internal/version.Date={{ .Date }}
  - id: caelis-windows-sandbox-setup
    main: ./cmd/caelis-windows-sandbox-setup
    binary: caelis-windows-sandbox-setup
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/OnslaughtSnail/caelis/internal/version.Version={{ .Tag }}
      - -X github.com/OnslaughtSnail/caelis/internal/version.Commit={{ .Commit }}
      - -X github.com/OnslaughtSnail/caelis/internal/version.Date={{ .Date }}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - caelis
      - caelis-command-runner
      - caelis-windows-sandbox-setup
    formats: [tar.gz]
    allow_different_binary_count: true

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
